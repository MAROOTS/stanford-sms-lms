spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: schoolbackend
  datasource:
    url: jdbc:postgresql://localhost:5432/school_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}


library:
  default-loan-days: 14